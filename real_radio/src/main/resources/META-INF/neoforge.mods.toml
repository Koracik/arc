modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Real Radio"
description='''
Realistic radio transmitter and receiver blocks powered by Plasmo Voice.
AM/FM tuning, range falloff, and static noise simulation.
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="plasmovoice"
    type="required"
    versionRange="[2.1.0,)"
    ordering="AFTER"
    side="BOTH"
