# Example: config/real_radio-common.toml
# Copy/merge into your world or game config folder after first launch.
# Path: <minecraft>/config/real_radio-common.toml
# For a dedicated server: <server>/config/real_radio-common.toml
# Restart (or use /reload if supported) after changes. Prefer full restart.

[gameplay]
	# true  = realism: no spectrum, no S-meter, no signal %
	# false = assist UI with station peaks and quality meter
	realismMode = true

[range]
	baseRangeBlocks = 2500
	amNightMultiplier = 1.3
	antennaHeightBonus = 1.35

[audio]
	squelchThreshold = 0.08
	staticVolumeScale = 0.05
	enableAgc = true
	agcExponent = 0.85

[propagation]
	enableLineOfSight = true
	losSampleStep = 6
	losMaxPenalty = 0.85
	losCacheGrid = 8
	losCacheTtlMs = 1500
	losCacheMax = 4096
	fmRainFactor = 0.85
	fmThunderFactor = 0.7

[features]
	# TX/RX channelKey must match (0 = open / unencrypted)
	requireMatchingKey = true
	# Max retransmissions per audio frame through relay blocks
	maxRelayHops = 3
	# Creative/debug coverage overlay (still off in realism for survival)
	enableCoverageOverlay = true
	# Max seconds buffered into a radio tape
	maxRecordingSeconds = 45
	# Handheld TX range as fraction of block transmitter range
	handheldRangeFactor = 0.35
